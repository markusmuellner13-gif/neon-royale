<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0f0d" />
  <meta name="description" content="Neon Royale — a luxury casino in your pocket. Roulette, Blackjack, Poker and Slots. Play with virtual coins. No real money." />
  <title>Neon Royale — Casino</title>

  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" type="image/png" href="/assets/icon-192.png" />
  <link rel="apple-touch-icon" href="/assets/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Neon Royale" />
  <meta name="mobile-web-app-capable" content="yes" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />

  <!-- Critical loader styles, inline to avoid flash -->
  <style>
    #boot{position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;
      background:radial-gradient(120% 120% at 50% 10%,#0d231b 0%,#060a08 60%,#000 100%);color:#f5d77a;
      font-family:'Cinzel',Georgia,serif;transition:opacity .6s ease, visibility .6s ease;}
    #boot.hide{opacity:0;visibility:hidden;}
    .boot-mark{width:118px;height:118px;border-radius:26px;box-shadow:0 0 40px rgba(245,197,66,.35),inset 0 0 0 2px rgba(245,197,66,.4);
      display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 50% 35%,#163a2b,#08140f);}
    .boot-mark svg{width:78px;height:78px;filter:drop-shadow(0 0 10px rgba(245,197,66,.6));}
    .boot-title{margin-top:26px;font-size:30px;letter-spacing:.18em;font-weight:900;
      background:linear-gradient(180deg,#fbe9a8,#d4af37 60%,#b8860b);-webkit-background-clip:text;background-clip:text;color:transparent;}
    .boot-sub{margin-top:6px;font-family:'Inter',sans-serif;font-size:12px;letter-spacing:.4em;color:#7fae97;text-transform:uppercase;}
    .boot-bar{margin-top:34px;width:210px;height:5px;border-radius:99px;background:rgba(255,255,255,.08);overflow:hidden;}
    .boot-fill{height:100%;width:30%;border-radius:99px;background:linear-gradient(90deg,#d4af37,#f7e7a3);animation:bootload 1.5s ease-in-out infinite;}
    .boot-tip{position:absolute;bottom:38px;font-family:'Inter',sans-serif;font-size:11px;color:#5d7d6e;letter-spacing:.06em;}
    @keyframes bootload{0%{transform:translateX(-120%);}100%{transform:translateX(360%);}}
  </style>
</head>
<body>
  <!-- Boot / loading screen -->
  <div id="boot">
    <div class="boot-mark">
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M10 24 L20 34 L32 14 L44 34 L54 24 L50 48 L14 48 Z" fill="#f5c542" stroke="#fff3c9" stroke-width="1.5" stroke-linejoin="round"/>
        <circle cx="20" cy="22" r="3.2" fill="#c0392b"/><circle cx="32" cy="12" r="3.2" fill="#c0392b"/><circle cx="44" cy="22" r="3.2" fill="#c0392b"/>
        <rect x="14" y="50" width="36" height="5" rx="2.5" fill="#d4af37"/>
      </svg>
    </div>
    <div class="boot-title">NEON ROYALE</div>
    <div class="boot-sub">Private Casino Club</div>
    <div class="boot-bar"><div class="boot-fill"></div></div>
    <div class="boot-tip">Shuffling the decks &amp; warming the wheel…</div>
  </div>

  <!-- App shell -->
  <div id="app" aria-hidden="false">
    <header id="topbar" class="topbar hidden">
      <button id="homeBtn" class="icon-btn" aria-label="Lobby" title="Lobby">
        <svg viewBox="0 0 24 24" width="22" height="22"><path d="M3 11l9-8 9 8M5 10v9h5v-6h4v6h5v-9" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="brand">NEON<span>ROYALE</span></div>
      <button id="bankBtn" class="balance" title="Your coins">
        <span class="coin-ico">🪙</span><span id="balanceVal">0</span>
      </button>
    </header>

    <main id="view" class="view"><!-- screens render here --></main>
  </div>

  <!-- Toast host -->
  <div id="toast-host" class="toast-host" aria-live="polite"></div>

  <script type="module" src="/js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
